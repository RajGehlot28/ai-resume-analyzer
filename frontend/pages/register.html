<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../styling/style.css">
    <title>Register - AI Resume Reviewer</title>
</head>
<body>
    <div class="auth-card">
        <h1>Register</h1>
        <p class="subtitle">Create a new account</p>
        <form id="registerForm">
            <div class="field-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter a unique username" required>
            </div>
            <div class="field-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="example@email.com" required>
            </div>
            <div class="field-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="At least 6 characters" required>
            </div>
            <button type="submit" id="registerBtn">Create Account</button>
        </form>
        <p class="subtitle" style="margin-top:20px;">Already have an account? <a href="login.html">Login</a></p>
    </div>
    <script type="module" src="../scripts/auth.js"></script>
</body>
</html>
